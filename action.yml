name: 'UC Student Sync'
description: 'Sync files from the UCStudent (UC) platform to your repository'
author: 'jdsoliveira'
inputs:
  username:
    description: 'UC student username (email or student number)'
    required: true
  password:
    description: 'UC student password'
    required: true
  download_dir:
    description: 'Directory to save files in'
    required: false
    default: '.'
  commit_message:
    description: 'Commit message for synced files'
    required: false
    default: 'chore: sync UC student files'
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ github.action_path }}/requirements.txt
        
    - name: Configure git for large pushes
      shell: bash
      run: git config --global http.postBuffer 524288000

    - name: Set up Git LFS
      shell: bash
      run: |
        git lfs install
        git lfs track "*.mp4" "*.zip" "*.rar" "*.7z" "*.tar.gz" "*.iso" "*.dmg"
        git add .gitattributes 2>/dev/null || true

    - name: Run sync script
      shell: bash
      env:
        UC_USERNAME: ${{ inputs.username }}
        UC_PASSWORD: ${{ inputs.password }}
        DOWNLOAD_DIR: ${{ inputs.download_dir }}
        PYTHONPATH: ${{ github.action_path }}
      run: python ${{ github.action_path }}/main.py
      
    - name: Track large files with Git LFS
      shell: bash
      run: |
        find . -type f -size +95M -not -path './.git/*' | while read -r f; do
          echo "Tracking large file with LFS: $f"
          git lfs track "$f"
        done
        git add .gitattributes 2>/dev/null || true

    - name: Log downloaded files and git status
      shell: bash
      run: |
        echo "Listing contents of download_dir:"
        ls -la ${{ inputs.download_dir }} || true
        echo "Current git status:"
        git status
      
    - name: Commit and push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: ${{ inputs.commit_message }}
        file_pattern: '*' # Pattern updated to capture all new folders
